space_z: 1.0

# 3D ROI裁剪尺寸
roi_x: 96
roi_y: 96
roi_z: 96

# 数据加载参数
num_workers: 1
cache_dataset: False
cache_rate: 0.05
image_only: True  # 仅加载图像，关闭标签逻辑
