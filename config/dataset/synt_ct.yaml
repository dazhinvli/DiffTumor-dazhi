# 数据集基本信息
name: synt_ct
data_root: /home/konglz/DiffTumor/data/
data_txt: /home/konglz/DiffTumor/data_list.txt

# 医学影像预处理参数
image_channels: 1
a_min: -175  # CT窗宽窗位：空气
a_max: 250   # CT窗宽窗位：骨骼
b_min: -1.0
